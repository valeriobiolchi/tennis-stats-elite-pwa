<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tennis Stats Elite</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tennis Stats Elite">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <!-- Libs CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
  <style>
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif; background:#f5f6fa; margin:0; padding:20px; }
    .container { max-width:1000px; margin:auto; }
    .card { background:white; padding:20px; margin-bottom:20px; border-radius:14px; box-shadow:0 6px 18px rgba(0,0,0,0.05);} 
    h3 { margin-top:0; }

    /* THEME */
    :root{ --accent:#9acd32; --accent-strong:#7fb02a; --accent-ink:#0a0a0a; --ease:cubic-bezier(.2,.8,.2,1); --t:180ms; }
    label, .stat-box, h3{ color: var(--accent-strong); }

    /* Variante 2: input + button centrati */
    input, select, button {
      width: 80%;
      margin: 10px auto;
      display: block;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid #ddd;
      font-size: 16px;
    }
    button{ background:var(--accent); color:var(--accent-ink); border:1px solid var(--accent-strong); cursor:pointer; transition: background-color var(--t) var(--ease), color var(--t) var(--ease), border-color var(--t) var(--ease), box-shadow var(--t) var(--ease), transform 120ms ease-out; }
    button:hover{ background:var(--accent-strong); color:#fff; box-shadow:0 6px 16px rgba(0,0,0,.12); transform: translateY(-1px);} 
    button:active{ transform: translateY(0); box-shadow:0 3px 8px rgba(0,0,0,.10);} 
    .small-btn{ width:auto; padding:6px 10px; font-size:12px; background:var(--accent); color:var(--accent-ink); border:1px solid var(--accent-strong);} 
    .small-btn:hover{ background:var(--accent-strong); color:#fff; }

    input, select{ background:#ffffff; color:#111; border:1px solid #cfd4dc; transition: background-color var(--t) var(--ease), color var(--t) var(--ease), border-color var(--t) var(--ease), box-shadow var(--t) var(--ease); }
    input::placeholder{ color:#6b7280; }
    input:focus, select:focus{ outline:none; border-color:var(--accent-strong); box-shadow:0 0 0 3px rgba(124,176,42,.25); }
    input[type=date]{ color:#111; background:#f7f7f7; -webkit-text-fill-color:#111; }
    input[type=date]::-webkit-calendar-picker-indicator{ filter: invert(35%); }

    .stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; }
    .stat-box{ background:#fafafa; padding:15px; border-radius:10px; text-align:center; font-weight:600; transition: background-color var(--t) var(--ease), color var(--t) var(--ease), border-color var(--t) var(--ease), box-shadow var(--t) var(--ease), transform 120ms ease-out; }
    .stat-box:hover{ box-shadow:0 8px 20px rgba(0,0,0,.08); transform: translateY(-2px); }

    .actions button{ margin-left:5px; }
    canvas{ margin-top:30px; }

    /* ====== Matches Grid (tabella) ====== */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; }
    .matches-table { width: 100%; border-collapse: collapse; background: #fff; font-size: 14px; }
    .matches-table th, .matches-table td { border-bottom: 1px solid #eee; padding: 10px 12px; text-align: left; white-space: nowrap; }
    .matches-table thead th { position: sticky; top: 0; z-index: 1; background: #f8fafc; color: #1f2937; font-weight: 700; }
    .matches-table tbody tr:hover { background: #fafcf6; }
    .matches-table .actions { display: flex; gap: 6px; }
    .matches-table .actions .small-btn { width: auto; }
    @media (max-width: 520px) { .matches-table th:nth-child(3), .matches-table td:nth-child(3) { display: none; } }

    /* Row coloring: vittoria = blu tenue, sconfitta = rosso tenue */
    .matches-table tbody tr.win  { background: #eaf3ff; }
    .matches-table tbody tr.loss { background: #ffefef; }
    .matches-table tbody tr.win:hover  { background: #dbeaff; }
    .matches-table tbody tr.loss:hover { background: #ffe3e3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="authCard">
      <h3>Login / Registrazione</h3>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button id="btnLogin">Login</button>
      <button id="btnRegister">Registrati</button>
    </div>

    <div id="app" style="display:none;">
      <div class="card">
        <button id="btnLogout">Logout</button>
      </div>

      <div class="card">
        <h3>Nuova / Modifica Partita</h3>
        <input type="hidden" id="matchId">
        <label for="date">Data</label>
        <input type="date" id="date">
        <label for="opponent">Avversario</label>
        <input type="text" id="opponent" placeholder="Avversario">
        <label for="result">Risultato</label>
        <input type="text" id="result" placeholder="Es: 2-4 4-2 10-4">
        <label for="opponentElo">ELO avversario</label>
        <input type="number" id="opponentElo" placeholder="ELO avversario (default 1500)">
        <button id="btnSave">Salva</button>
      </div>

      <div class="card">
        <h3>Filtro per anno</h3>
        <select id="yearFilter">
          <option value="">Tutti gli anni</option>
        </select>
      </div>

      <div class="card">
        <h3>Dashboard</h3>
        <div class="stats">
          <div class="stat-box" id="winPct"></div>
          <div class="stat-box" id="setPct"></div>
          <div class="stat-box" id="gamePct"></div>
          <div class="stat-box" id="tbPct"></div>
          <div class="stat-box" id="eloCurrent"></div>
        </div>
      </div>

      <div class="card">
        <h3>Grafici</h3>
        <canvas id="chartElo"></canvas>
      </div>

      <div class="card">
        <h3>Partite</h3>
        <div id="matchesList"></div>
      </div>
    </div>
  </div>

  <script>
    // ====== CONFIG ======
    const SUPABASE_URL = "https://uqsyiudmvrabiaticeia.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxc3lpdWRtdnJhYmlhdGljZWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDU0ODIsImV4cCI6MjA4NzUyMTQ4Mn0.JkICvsrfi8znI-aOs2LdIPLs6SzKlKzyS4z2ss_8GIQ";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ====== STATE ======
    let matches = [];
    let charts = [];

    // ====== DOM ======
    const authCard = document.getElementById('authCard');
    const app = document.getElementById('app');
    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const btnLogin = document.getElementById('btnLogin');
    const btnRegister = document.getElementById('btnRegister');
    const btnLogout = document.getElementById('btnLogout');
    const btnSave = document.getElementById('btnSave');
    const yearFilter = document.getElementById('yearFilter');
    const matchId = document.getElementById('matchId');
    const dateEl = document.getElementById('date');
    const opponentEl = document.getElementById('opponent');
    const resultEl = document.getElementById('result');
    const opponentEloEl = document.getElementById('opponentElo');
    const winPct = document.getElementById('winPct');
    const setPct = document.getElementById('setPct');
    const gamePct = document.getElementById('gamePct');
    const tbPct = document.getElementById('tbPct');
    const eloCurrent = document.getElementById('eloCurrent');
    const matchesList = document.getElementById('matchesList');
    const chartElo = document.getElementById('chartElo');

    // ====== AUTH ======
    btnLogin.addEventListener('click', async () => {
      try{ const { error } = await supabaseClient.auth.signInWithPassword({ email: emailEl.value, password: passwordEl.value }); if(error) throw error; }catch(e){ alert('Login fallito: ' + (e?.message||e)); }
    });
    btnRegister.addEventListener('click', async () => {
      try{ const { error } = await supabaseClient.auth.signUp({ email: emailEl.value, password: passwordEl.value }); if(error) throw error; alert('Registrazione avviata: controlla la tua email.'); }catch(e){ alert('Registrazione fallita: ' + (e?.message||e)); }
    });
    btnLogout.addEventListener('click', async () => { await supabaseClient.auth.signOut(); });

    supabaseClient.auth.onAuthStateChange((e, session) => {
      if(session){ authCard.style.display='none'; app.style.display='block'; fetchMatches(); }
      else { authCard.style.display='block'; app.style.display='none'; }
    });

    // ====== CRUD ======
    async function fetchMatches(){
      const { data, error } = await supabaseClient.from('matches').select('*').order('date',{ascending:true});
      if(error){ console.error(error); return; }
      matches = data || [];
      populateYears();
      render();
    }

    async function saveMatch(){
      const { data: { user }, error: userErr } = await supabaseClient.auth.getUser();
      if(userErr){ alert('Errore autenticazione: ' + (userErr.message || userErr)); return; }
      if(!user){ alert('Devi essere autenticato'); return; }

      const baseFields = {
        date: dateEl.value,
        opponent: opponentEl.value,
        result: resultEl.value,
        opponent_elo: Number(opponentEloEl.value || 1500)
      };

      try{
        if (matchId.value){
          const { data, error } = await supabaseClient
            .from('matches')
            .update(baseFields)
            .eq('id', matchId.value)
            .select();
          if (error) throw error;
          if (!data || data.length === 0) { alert('Nessuna riga aggiornata. Verifica RLS/ID.'); return; }
          // UI ottimistica
          const i = matches.findIndex(m => String(m.id) === String(matchId.value));
          if (i>=0) matches[i] = { ...matches[i], ...baseFields };
        } else {
          const payload = { ...baseFields, user_id: user.id };
          const { error } = await supabaseClient.from('matches').insert([payload]);
          if (error) throw error;
        }
        // Reset form
        matchId.value=''; dateEl.value=''; opponentEl.value=''; resultEl.value=''; opponentEloEl.value='';
        render();
        await fetchMatches();
      }catch(e){ alert('Errore salvataggio: ' + (e?.message||e)); console.error(e); }
    }
    btnSave.addEventListener('click', saveMatch);

    async function deleteMatch(id){ await supabaseClient.from('matches').delete().eq('id', id); await fetchMatches(); }
    function editMatch(m){ matchId.value=m.id; dateEl.value=m.date; opponentEl.value=m.opponent; resultEl.value=m.result; opponentEloEl.value=m.opponent_elo; window.scrollTo({top:0,behavior:'smooth'}); }
    window.deleteMatch = deleteMatch; window.editMatch = editMatch;

    // ====== FILTERS ======
    function populateYears(){
      const years = [...new Set((matches||[]).map(m => (m?.date||'').substring(0,4)).filter(Boolean))].sort();
      const cur = yearFilter.value;
      yearFilter.innerHTML = '<option value="">Tutti gli anni</option>' + years.map(y=>`<option ${y===cur?'selected':''}>${y}</option>`).join('');
    }
    function getFiltered(){
      const y = yearFilter.value;
      return y ? (matches||[]).filter(m => (m?.date||'').startsWith(y)) : (matches||[]);
    }
    yearFilter.addEventListener('change', () => render());

    // ====== STATS ======
    function calculateStats(data){
      if(!data || !data.length) return {win:0,set:0,game:0,tb:0};
      let mWon=0,sWon=0,sTot=0,gWon=0,gTot=0,tbWon=0,tbTot=0;
      data.forEach(match=>{
        const sets=(match.result||'').trim().split(/\s+/).filter(Boolean);
        let w=0,l=0,fw=0,fl=0;
        sets.forEach((set,i)=>{
          const [a,b]=set.split('-').map(Number); if(Number.isNaN(a)||Number.isNaN(b)) return;
          sTot++; gTot+=a+b; gWon+=a;
          if(a>b){ sWon++; w++; if(i<2)fw++; } else { l++; if(i<2)fl++; }
          if(i===2 && fw===1 && fl===1 && (a>=10||b>=10)){ tbTot++; if(a>b) tbWon++; }
        });
        if(w>l)mWon++;
      });
      return { win:(mWon/data.length*100)||0, set:(sWon/sTot*100)||0, game:(gWon/gTot*100)||0, tb:(tbWon/Math.max(tbTot,1)*100)||0 };
    }

    // ====== ELO ======
    function calculateElo(data){ let elo=1500; const K=32; const history=[]; data.forEach(match=>{ const sets=(match.result||'').trim().split(/\s+/).filter(Boolean); let w=0,l=0; sets.forEach(s=>{ const [a,b]=s.split('-').map(Number); if(!Number.isNaN(a)&&!Number.isNaN(b)){ if(a>b)w++; else l++; } }); const score=w>l?1:0; const oppElo=Number(match.opponent_elo||1500); const expected=1/(1+Math.pow(10,(oppElo-elo)/400)); elo=elo+K*(score-expected); history.push(Math.round(elo)); }); return history; }

    // ====== TABLE SORT ======
    function enableTableSorting(){
      const table = document.getElementById('matchesTable'); if(!table) return;
      const getCellValue = (tr, idx) => tr.children[idx]?.textContent.trim() ?? '';
      const toNumberOr = (v, fb='') => { const n = Number(v); return Number.isNaN(n) ? fb : n; };
      table.querySelectorAll('thead th[data-key]').forEach((th, idx) => {
        let asc = true; th.style.cursor='pointer';
        th.addEventListener('click', () => {
          const tbody = table.tBodies[0];
          const rows = Array.from(tbody.querySelectorAll('tr'));
          const key = th.getAttribute('data-key');
          rows.sort((a,b)=>{
            const va = getCellValue(a, idx), vb = getCellValue(b, idx);
            if(key==='opponent_elo') return (toNumberOr(va,-Infinity)-toNumberOr(vb,-Infinity))*(asc?1:-1);
            if(key==='date') return va.localeCompare(vb)*(asc?1:-1);
            return va.localeCompare(vb,'it',{sensitivity:'base'})*(asc?1:-1);
          });
          rows.forEach(r=>tbody.appendChild(r));
          asc = !asc;
        });
      });
    }

    // ====== RENDER ======
    function render(){
      const data = getFiltered() || [];
      const stats = calculateStats(data);
      const eloHistory = calculateElo(data);
      winPct.innerText = `Vittorie: ${stats.win.toFixed(1)}%`;
      setPct.innerText = `Set vinti: ${stats.set.toFixed(1)}%`;
      gamePct.innerText = `Giochi vinti: ${stats.game.toFixed(1)}%`;
      tbPct.innerText = `Tie-break vinti: ${stats.tb.toFixed(1)}%`;
      eloCurrent.innerText = `ELO: ${eloHistory.slice(-1)[0]||1500}`;

      const rows = (data.slice().reverse()).map(m => {
        const safeOpp = (m?.opponent ? String(m.opponent) : '').replace(/[<>&]/g,'');
        const dateStr = m?.date || '';
        const elo = (m?.opponent_elo!=null) ? m.opponent_elo : 1500;
        const res = m?.result || '';
        // Colora riga in base al risultato (conteggio set)
        let w=0,l=0;
        (res.trim().split(/\s+/).filter(Boolean)).forEach(s=>{
          const [a,b] = s.split('-').map(Number);
          if(!Number.isNaN(a) && !Number.isNaN(b)) { if(a>b) w++; else l++; }
        });
        const outcomeClass = (w>l) ? 'win' : 'loss';
        const editBtn = `<button class=\"small-btn\" onclick='editMatch(${JSON.stringify(m)})'>✏️</button>`;
        const delBtn  = `<button class=\"small-btn\" onclick=\"deleteMatch(${m?.id||''})\">❌</button>`;
        return `<tr class=\"${outcomeClass}\"><td>${dateStr}</td><td>${safeOpp}</td><td>${elo}</td><td>${res}</td><td class=\"actions\">${editBtn}${delBtn}</td></tr>`;
      }).join('');

      matchesList.innerHTML = `
        <div class=\"table-wrap\">\n  <table class=\"matches-table\" id=\"matchesTable\">\n    <thead>\n      <tr>\n        <th data-key=\"date\">Data ⬍</th>\n        <th data-key=\"opponent\">Avversario ⬍</th>\n        <th data-key=\"opponent_elo\">ELO ⬍</th>\n        <th data-key=\"result\">Risultato</th>\n        <th>Azioni</th>\n      </tr>\n    </thead>\n    <tbody>${rows}</tbody>\n  </table>\n</div>`;

      charts.forEach(c=>{try{c.destroy()}catch(_){}}); charts=[];
      try {
        charts.push(new Chart(chartElo, {
          type:'line',
          data:{ labels:data.map(m=>m.date), datasets:[{ label:'ELO Rating', data:eloHistory, borderColor:'black', tension:0.2 }]},
          options:{ responsive:true, plugins:{ legend:{display:true}}, scales:{ x:{ title:{display:true, text:'Data'}}, y:{ title:{display:true, text:'ELO'}} } }
        }));
      } catch(e){ console.error('Chart error', e); }

      enableTableSorting();
    }

    // ====== PWA SW ======
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js?bust=v6').catch(err=>console.error('SW reg failed:', err));
      });
    }
  </script>
</body>
</html>
